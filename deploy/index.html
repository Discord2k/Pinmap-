<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f6f1e4" />
  <meta name="description" content="PINMAP — drop pins, tag them with anything, discover quiet places." />
  <title>PINMAP</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #f6f1e4;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: #1a201c;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }
    body { position: fixed; inset: 0; }
    #root { position: fixed; inset: 0; }
    .leaflet-container { background: #efe9d8 !important; }
    .leaflet-control-attribution, .leaflet-control-zoom { display: none !important; }
    .pm-loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      color: #6f786f;
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    }
    .pm-loading .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #2a5d3c;
      animation: pmpulse 1.2s ease-in-out infinite;
    }
    @keyframes pmpulse { 0%,100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="pm-loading">
      <div class="dot"></div>
      <div>PINMAP · loading</div>
    </div>
  </div>

  <script type="text/babel" src="app/shared.jsx"></script>
  <script type="text/babel" src="app/atlas.jsx"></script>
  <script type="text/babel" data-presets="react">
    // Mount the app fullscreen — no device frame, no design canvas.
    // The AtlasApp component fills its container via position:absolute.
    setTimeout(() => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<AtlasApp />);
    }, 60);
  </script>
</body>
</html>
