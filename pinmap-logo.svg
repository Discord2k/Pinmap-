<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>PINMAP Logo</title>
  <desc>A green map pin with a white hashtag symbol inside, on a dark forest green rounded square background</desc>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="680" height="680" rx="140" fill="#1b4332"/>

  <!-- Subtle dot grid texture -->
  <defs>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#ffffff"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="680" height="680" rx="140" fill="url(#dots)" opacity="0.07"/>

  <!-- Pin shadow -->
  <ellipse cx="342" cy="510" rx="72" ry="18" fill="#000000" opacity="0.2"/>

  <!-- Pin body - teardrop shape -->
  <path d="M340 110 C240 110 165 185 165 285 C165 415 340 520 340 520 C340 520 515 415 515 285 C515 185 440 110 340 110 Z"
        fill="#ffffff" opacity="0.95"/>

  <!-- Pin inner circle -->
  <circle cx="340" cy="278" r="102" fill="#2e7d32"/>

  <!-- Hashtag symbol - two horizontal bars -->
  <rect x="285" y="248" width="112" height="18" rx="9" fill="#ffffff"/>
  <rect x="285" y="290" width="112" height="18" rx="9" fill="#ffffff"/>

  <!-- Hashtag symbol - two vertical bars -->
  <rect x="308" y="226" width="18" height="104" rx="9" fill="#ffffff"/>
  <rect x="352" y="226" width="18" height="104" rx="9" fill="#ffffff"/>

  <!-- PINMAP wordmark -->
  <text x="340" y="600" text-anchor="middle"
        font-family="Courier New, monospace"
        font-weight="700"
        font-size="58"
        letter-spacing="10"
        fill="#ffffff"
        opacity="0.92">PINMAP</text>

  <!-- Tagline -->
  <text x="340" y="640" text-anchor="middle"
        font-family="Courier New, monospace"
        font-weight="400"
        font-size="18"
        letter-spacing="4"
        fill="#ffffff"
        opacity="0.45">discover · save · share</text>

</svg>
