<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PINMAP</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#2e7d32" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="PINMAP" />
  <link rel="apple-touch-icon" href="./icon-192.png" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body { background: #f0e8d0; font-family: Courier New, monospace; }
    #err { display:none; position:fixed; top:0; left:0; right:0; background:#fff3cd; border-bottom:2px solid #ffc107; padding:12px 16px; font-size:12px; z-index:99999; white-space:pre-wrap; word-break:break-all; max-height:40vh; overflow-y:auto; }
    
    /* Marker Cluster Styling */
    .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
      background-color: rgba(46, 125, 50, 0.9) !important;
      color: #fff !important;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="err"></div>
  <div id="root"></div>

  <script>
    // Error Handling
    function showErr(msg){var el=document.getElementById("err");el.style.display="block";el.textContent+=msg+"\n---\n";}
    window.onerror=function(msg,src,line){showErr("JS ERROR: "+msg+"\nAt: "+src+":"+line);return false;};
    window.addEventListener("unhandledrejection",function(ev){showErr("PROMISE: "+(ev.reason&&ev.reason.message?ev.reason.message:String(ev.reason)));});

    const e = React.createElement;
    const { useState, useEffect, useRef } = React;

    // ... (Keep your SB_URL, SB_KEY, and api object exactly as they were) ...

    // --- PASTE YOUR API AND UTILITY FUNCTIONS HERE ---

    function App() {
      var mapDiv=useRef(null), mapObj=useRef(null), markers=useRef({}), clusterGroup=useRef(null);
      // ... (Keep your existing useState hooks) ...

      // Map Initialization
      useEffect(function(){
        if(mapObj.current) return;
        var map=window.L.map(mapDiv.current,{zoomControl:false,scrollWheelZoom:true}).setView([39,-98],4);
        window.L.control.zoom({position:"bottomleft"}).addTo(map);
        window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
        
        // Initialize Cluster Group once
        clusterGroup.current = window.L.markerClusterGroup({
            showCoverageOnHover: false,
            maxClusterRadius: 50
        });
        map.addLayer(clusterGroup.current);
        
        map.on("click",function(ev){
          setPendingLL(ev.latlng);
          setTab("add");
          setOpen(true);
        });
        mapObj.current=map;
      },[]);

      // Marker Sync with Clustering
      useEffect(function(){
        if(!mapObj.current || !clusterGroup.current) return;
        
        clusterGroup.current.clearLayers();
        markers.current={};
        
        var visible = activeFilter ? pins.filter(p => p.tags && p.tags.indexOf(activeFilter) >= 0) : pins;
        
        visible.forEach(function(pin){
          var color = pin.color || "#2e7d32";
          var icon = window.L.divIcon({
            className: "pm-pin",
            html: '<svg width="30" height="38" viewBox="0 0 26 34"><path d="M13 0C5.82 0 0 5.82 0 13c0 9.75 13 21 13 21S26 22.75 26 13C26 5.82 20.18 0 13 0z" fill="'+color+'" stroke="white" stroke-width="1.5"/><circle cx="13" cy="13" r="4" fill="white"/></svg>',
            iconSize: [30, 38],
            iconAnchor: [15, 38]
          });
          
          var m = window.L.marker([pin.lat, pin.lng], {icon: icon});
          m.on("click", function(){ setSelPin(pin); setOpen(false); });
          
          markers.current[pin.id] = m;
          clusterGroup.current.addLayer(m);
        });
      }, [pins, activeFilter]);

      // ... (Keep the rest of your App component return and logic) ...
    }

    ReactDOM.createRoot(document.getElementById("root")).render(e(App));
  </script>
</body>
</html>
