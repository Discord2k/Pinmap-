  <script>
    function showErr(msg) {
      var el = document.getElementById("err");
      el.style.display = "block";
      el.textContent += msg + "\n---\n";
    }
    window.onerror = function(msg, src, line, col, err) {
      showErr("JS ERROR: " + msg + "\nAt: " + src + ":" + line);
      return false;
    };
    window.addEventListener("unhandledrejection", function(ev) {
      showErr("PROMISE: " + (ev.reason && ev.reason.message ? ev.reason.message : String(ev.reason)));
    });
    window.addEventListener("error", function(ev) {
      if (ev.target && ev.target.src) showErr("LOAD FAILED: " + ev.target.src);
    }, true);
  </script>

var COLORS = ["#2e7d32","#e65100","#1565c0","#ad1457","#6a1599","#00695c","#c62828","#4e342e"];
function uid() { return Math.random().toString(36).slice(2,10); }
function tagColor(tag) { var h=0; for(var i=0;i<tag.length;i++) h=(h*31+tag.charCodeAt(i))>>>0; return COLORS[h%COLORS.length]; }
function distKm(a,b,c,d) { var R=6371,dL=(c-a)*Math.PI/180,dl=(d-b)*Math.PI/180,x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dl/2)*Math.sin(dl/2); return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)); }
function dlFile(content,name,type) { var a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([content],{type:type})); a.download=name; a.click(); }
function toGeoJSON(pins) { return JSON.stringify({type:"FeatureCollection",features:pins.map(function(p){return {type:"Feature",geometry:{type:"Point",coordinates:[p.lng,p.lat]},properties:{name:p.name,description:p.description,tags:p.tags,owner:p.owner}};})},null,2); }
function toGPX(pins) { return '<?xml version="1.0"?><gpx version="1.1" creator="PINMAP">'+pins.map(function(p){return '<wpt lat="'+p.lat+'" lon="'+p.lng+'"><n>'+p.name+'</n><desc>'+(p.description||"")+' '+(p.tags||[]).map(function(t){return "#"+t;}).join(" ")+'</desc></wpt>';}).join("")+"</gpx>"; }

function App() {

  var sessionState=useState(false); var sessionChecked=sessionState[0]; var setSessionChecked=sessionState[1];

  var searchResState=useState(null); var searchResults=searchResState[0]; var setSearchResults=searchResState[1];
  var filterState=useState(null); var activeFilter=filterState[0]; var setActiveFilter=filterState[1];
  var formState=useState({name:"",description:"",tags:"",privacy:"public",photo:null}); var form=formState[0]; var setForm=formState[1];
  var pendingState=useState(null); var pendingLL=pendingState[0]; var setPendingLL=pendingState[1];
  var selPinState=useState(null); var selPin=selPinState[0]; var setSelPin=selPinState[1];
  var toastState=useState(""); var toast=toastState[0]; var setToast=toastState[1];
  var userLLState=useState(null); var userLL=userLLState[0]; var setUserLL=userLLState[1];
  var locatingState=useState(false); var locating=locatingState[0]; var setLocating=locatingState[1];
  var nearbyKmState=useState(10); var nearbyKm=nearbyKmState[0]; var setNearbyKm=nearbyKmState[1];
  var nearbyResState=useState(null); var nearbyRes=nearbyResState[0]; var setNearbyRes=nearbyResState[1];

  function flash(msg) { setToast(msg); setTimeout(function(){setToast("");},3000); }

  // Auth init
  useEffect(function(){
    api.getSession().then(function(res){
      var s = res.data && res.data.session;

          ? session.user.user_metadata.full_name

    return function(){ if(sub && sub.data) sub.data.subscription.unsubscribe(); };

  // Map init
  useEffect(function(){
    if(mapObj.current) return;

      if(!window.L||!mapDiv.current){setTimeout(tryInit,100);return;}

      window.L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{attribution:"? OpenStreetMap contributors, ? CARTO",maxZoom:19}).addTo(map);
      map.on("click",function(ev){setPendingLL(ev.latlng);setTab("add");setOpen(true);flash("[pin] Location set");});
      mapObj.current=map;

  },[]);

  useEffect(function(){

  },[sessionChecked]);

  useEffect(function(){
    if(!mapObj.current||!window.L) return;
    Object.values(markers.current).forEach(function(m){m.remove();});

  function savePin(){
    if(!user){api.signInGoogle();return;}
    if(!pendingLL){flash("(!) Click the map first");return;}
    if(!form.name.trim()){flash("(!) Name required");return;}
    if(!form.tags.trim()){flash("(!) At least one tag required");return;}

    if(!searchTag.trim()) return;
    var tag=searchTag.replace(/^#/,"").toLowerCase().trim();

      if(!results.length) flash("No public pins for #"+tag);

  }

  function findNearby(){
    if(!userLL){flash("(!) Use GPS button first");return;}
    var results=pins.filter(function(p){return p.privacy==="public"||user && user && p.owner===user.name.name;}).map(function(p){return Object.assign({},p,{dist:distKm(userLL.lat,userLL.lng,p.lat,p.lng)});}).filter(function(p){return p.dist<=nearbyKm;}).sort(function(a,b){return a.dist-b.dist;});
    setNearbyRes(results);
    if(!results.length) flash("No pins within "+nearbyKm+"km");

  function gpsLocate(){
    if(!navigator.geolocation){flash("(!) Not supported");return;}
    setLocating(true);

      setLocating(false); flash("[gps] Found!");

  }

  function onFabDown(ev){
    ev.preventDefault();
    var sx=ev.clientX,sy=ev.clientY,rect=ev.currentTarget.getBoundingClientRect(),moved=false;
    function onMove(e){var dx=e.clientX-sx,dy=e.clientY-sy;if(Math.abs(dx)>5||Math.abs(dy)>5)moved=true;if(!moved)return;setFabPos({right:Math.max(8,Math.min(window.innerWidth-64,window.innerWidth-(rect.right+dx))),bottom:Math.max(8,Math.min(window.innerHeight-64,window.innerHeight-(rect.bottom+dy)))});}
    function onUp(){window.removeEventListener("pointermove",onMove);window.removeEventListener("pointerup",onUp);if(!moved)setOpen(function(o){return !o;});}
    window.addEventListener("pointermove",onMove);window.addEventListener("pointerup",onUp);
  }

  function bubblePos(){
    var vw=window.innerWidth,vh=window.innerHeight,bw=300,bh=Math.min(vh*0.72,540);
    var right=fabPos.right,bottom=fabPos.bottom+58;
