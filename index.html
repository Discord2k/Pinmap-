  <style>
    :root {
      --paper:      #f6f1e4;
      --paper2:     #efe9d8;
      --paper3:     #e8e1cd;
      --ink:        #1a201c;
      --ink2:       #3c4540;
      --ink3:       #6f786f;
      --forest:     #2a5d3c;
      --forest2:    #1f4a30;
      --forestPale: #dde6dc;
      --border:     #d8cfb8;
      --borderSoft: #e6dfca;
      /* Universal Padding Additions */
      --nav-height: 70px;
      --universal-bottom: calc(var(--nav-height) + env(safe-area-inset-bottom, 0px));
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height:100%; width:100%; overflow:hidden;
      font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      background:var(--paper); color:var(--ink);
      -webkit-font-smoothing:antialiased;
      -webkit-tap-highlight-color:transparent;
      -webkit-text-size-adjust:100%;
      overscroll-behavior:none;
    }
    body { position:fixed; inset:0; }
    #root { height:100%; width:100%; position:fixed; top:0; left:0; }
    .leaflet-container { height:100%!important; width:100%!important; background:var(--paper2)!important; }
    .leaflet-tile-pane { filter:saturate(0.55) contrast(0.92) brightness(1.03) sepia(0.04); }
    .pm-pin { background:none!important; border:none!important; }
    #map { height:100%!important; width:100%!important; position:absolute!important; top:0!important; left:0!important; }
    
    /* Updated Universal Window Classes */
    .pm-toast { 
      bottom: calc(var(--universal-bottom) + 12px) !important; 
    }
    .pm-detail { 
      bottom: var(--universal-bottom) !important; 
      left: 16px !important; 
      right: 16px !important;
      padding-bottom: 80px !important; /* Internal scroll space for comments */
    }
    .bubble {
      bottom: var(--universal-bottom) !important;
    }
    .fab-btn { 
      bottom: var(--universal-bottom) !important; 
      right: calc(20px + env(safe-area-inset-right,0px)) !important;
    }

    input,textarea,button,select { font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif; letter-spacing:-0.005em; -webkit-font-smoothing:antialiased; }
    .mono { font-family:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace; font-feature-settings:"tnum"; }
    .caps { font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase; font-weight:600; }
    input:focus,textarea:focus { outline:none; border-color:var(--forest)!important; box-shadow:0 0 0 3px rgba(42,93,60,0.10); }
    button:active { transform:scale(0.97); }
    ::selection { background:var(--forestPale); }
    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    @keyframes slideIn    { from{opacity:0;transform:translateY(8px)}  to{opacity:1;transform:translateY(0)} }
    @keyframes slideUp    { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideDown  { from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn     { from{opacity:0} to{opacity:1} }
    @keyframes scaleIn    { from{opacity:0;transform:scale(0.92)}      to{opacity:1;transform:scale(1)} }
    @keyframes popIn      { 0%{opacity:0;transform:scale(0.8) translateY(8px)} 70%{transform:scale(1.03) translateY(0)} 100%{opacity:1;transform:scale(1) translateY(0)} }
    @keyframes pulse      { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    .pm-fadein   { animation:fadeIn  0.2s ease both; }
    .pm-slidein  { animation:slideIn 0.25s cubic-bezier(0.34,1.2,0.64,1) both; }
    .pm-slideup  { animation:slideUp 0.3s cubic-bezier(0.34,1.1,0.64,1) both; }
    .pm-slidedown{ animation:slideDown 0.2s ease both; }
    .pm-scalein  { animation:scaleIn 0.2s cubic-bezier(0.34,1.2,0.64,1) both; }
    .pm-popin    { animation:popIn   0.35s cubic-bezier(0.34,1.4,0.64,1) both; }
    #err { display:none; position:fixed; top:0; left:0; right:0; background:#fff3cd; border-bottom:2px solid #ffc107; padding:12px 16px; font-size:12px; z-index:99999; white-space:pre-wrap; word-break:break-all; max-height:40vh; overflow-y:auto; }
  </style>
