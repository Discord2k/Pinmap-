<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PINMAP</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#2a5d3c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="PINMAP" />
  <link rel="apple-touch-icon" href="./icon-192.png" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    :root {
      --paper:      #f6f1e4;
      --paper2:     #efe9d8;
      --paper3:     #e8e1cd;
      --ink:        #1a201c;
      --ink2:       #3c4540;
      --ink3:       #6f786f;
      --forest:     #2a5d3c;
      --forest2:    #1f4a30;
      --forestPale: #dde6dc;
      --border:     #d8cfb8;
      --borderSoft: #e6dfca;
      
      /* THE OFFSET FIX */
      --nav-height: 70px;
      --universal-bottom: calc(var(--nav-height) + env(safe-area-inset-bottom, 12px));
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height:100%; width:100%; overflow:hidden;
      font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      background:var(--paper); color:var(--ink);
      -webkit-font-smoothing:antialiased;
      -webkit-tap-highlight-color:transparent;
      -webkit-text-size-adjust:100%;
      overscroll-behavior:none;
    }
    body { position:fixed; inset:0; }
    #root { height:100%; width:100%; position:fixed; top:0; left:0; }
    .leaflet-container { height:100%!important; width:100%!important; background:var(--paper2)!important; }
    .pm-pin { background:none!important; border:none!important; }
    #map { height:100%!important; width:100%!important; position:absolute!important; top:0!important; left:0!important; }

    /* FORCED POSITIONING VIA CSS */
    .pm-detail { 
      position: absolute !important;
      bottom: var(--universal-bottom) !important; 
      left: 16px !important; 
      right: 16px !important;
      top: 40% !important; /* Locks height to ensure scrollability */
      padding-bottom: 110px !important; /* Extra space to clear the nav bar */
      z-index: 10
