<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2e7d32" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="PINMAP" />
  <meta name="description" content="Tag the terrain. Share the stoke." />
  <link rel="manifest" href="./manifest.json" />
  <title>PINMAP</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #f0e8d0; }
    #root { height: 100%; width: 100%; }
    .leaflet-container { height: 100% !important; width: 100% !important; }
    .custom-pin { background: none !important; border: none !important; }
    @keyframes pmPop { 0%{opacity:0;transform:scale(0.82)} 65%{opacity:1;transform:scale(1.03)} 100%{transform:scale(1)} }
    @keyframes pmFade { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pmSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .pm-bubble { animation: pmPop 0.22s cubic-bezier(0.34,1.3,0.64,1) both; }
    .pm-detail { animation: pmFade 0.15s ease both; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" src="./app.js" data-presets="react"></script>

  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
