    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {

    .leaflet-container { height:100%!important; width:100%!important; background:var(--paper2)!important; }
    .pm-pin { background:none!important; border:none!important; }
    #map { height:100%!important; width:100%!important; position:absolute!important; top:0!important; left:0!important; }

    /* NUCLEAR CSS FIX FOR OVERLAP */
    .pm-detail {

      right: 16px !important;
      top: 40% !important; 
      padding-bottom: 120px !important; /* Scrollable space for comments */
      z-index: 1001 !important;
      display: flex !important;
      flex-direction: column !important;
      overflow-y: auto !important;
    }

    .pm-toast { bottom: calc(var(--universal-bottom) + 16px) !important; z-index: 1002 !important; }
    .bubble { bottom: var(--universal-bottom) !important; z-index: 1000 !important; }
    
    /* ... (rest of CSS animations/classes) ... */
    input,textarea,button,select { font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif; letter-spacing:-0.005em; -webkit-font-smoothing:antialiased; }
    .mono { font-family:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace; font-feature-settings:"tnum"; }
    @keyframes slideUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
    .pm-slideup { animation:slideUp 0.3s cubic-bezier(0.34,1.1,0.64,1) both; }
    #err { display:none; position:fixed; top:0; left:0; right:0; background:#fff3cd; border-bottom:2px solid #ffc107; padding:12px 16px; font-size:12px; z-index:99999; white-space:pre-wrap; word-break:break-all; max-height:40vh; overflow-y:auto; }
