<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PINMAP</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2e7d32" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PINMAP" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link href="https://unpkg.com/maplibre-gl@4.7.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.7.0/dist/maplibre-gl.js" crossorigin></script>
    <style>
      .maplibregl-ctrl-bottom-left {
        bottom: calc(108px + env(safe-area-inset-bottom, 0px)) !important;
        left: 14px !important;
      }
    </style>
    <script>
      // Early capture of PWA install prompt to avoid race conditions
      window._installPromptEvent = null;
      window.addEventListener("beforeinstallprompt", function(e) {
        e.preventDefault();
        window._installPromptEvent = e;
        window.dispatchEvent(new CustomEvent("installpromptavailable", { detail: e }));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
